name: Pull Request Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  pr-validation:
    name: PR Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better diff

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Check PR size
        run: |
          FILES_CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | wc -l)
          echo "📊 Files changed: $FILES_CHANGED"

          if [ $FILES_CHANGED -gt 50 ]; then
            echo "⚠️  Warning: Large PR detected ($FILES_CHANGED files)"
            echo "Consider breaking this into smaller PRs for easier review"
          else
            echo "✓ PR size is reasonable"
          fi

      - name: Verify no secrets committed
        run: |
          echo "🔍 Checking for accidentally committed secrets..."

          # Check for common secret patterns
          if git diff origin/${{ github.base_ref }}...HEAD | grep -i "password\|api_key\|secret\|token" | grep -v "passwordHash\|// password"; then
            echo "⚠️  Warning: Potential secrets detected in diff"
            echo "Please review changes carefully"
          else
            echo "✓ No obvious secrets detected"
          fi
        continue-on-error: true

      - name: Check migration changes
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep "prisma/migrations"; then
            echo "📊 Database migration detected"
            echo "⚠️  Make sure to run migrations before deploying"
          else
            echo "ℹ️ No migration changes"
          fi

      - name: PR validation complete
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ Pull request validation complete!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
